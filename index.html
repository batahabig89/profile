<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Loading...</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Ursa Minor: seven stars of the Little Dipper (Polaris = α UMi at handle tip) -->
    <svg
        class="constellation-ursa-minor"
        viewBox="0 0 100 132"
        xmlns="http://www.w3.org/2000/svg"
        role="img"
        aria-labelledby="ursaMinorTitle"
    >
        <title id="ursaMinorTitle">Ursa Minor — seven stars of the Little Dipper</title>
        <defs>
            <filter id="ursaStarHalo" x="-60%" y="-60%" width="220%" height="220%">
                <feGaussianBlur in="SourceAlpha" stdDeviation="0.65" result="blur" />
                <feFlood flood-color="rgb(200, 230, 255)" flood-opacity="0.55" result="glow" />
                <feComposite in="glow" in2="blur" operator="in" result="soft" />
                <feMerge>
                    <feMergeNode in="soft" />
                    <feMergeNode in="SourceGraphic" />
                </feMerge>
            </filter>
            <filter id="ursaPolarisHalo" x="-80%" y="-80%" width="260%" height="260%">
                <feGaussianBlur in="SourceAlpha" stdDeviation="1.1" result="blur" />
                <feFlood flood-color="rgb(120, 220, 200)" flood-opacity="0.5" result="glow" />
                <feComposite in="glow" in2="blur" operator="in" result="soft" />
                <feMerge>
                    <feMergeNode in="soft" />
                    <feMergeNode in="SourceGraphic" />
                </feMerge>
            </filter>
        </defs>
        <polyline
            class="constellation-ursa-minor__lines"
            points="51,6 48.5,24 46,41 43,58 29,70 71,74 19.5,92 43,58"
            fill="none"
        />
        <circle class="constellation-ursa-minor__star constellation-ursa-minor__star--polaris" cx="51" cy="6" r="3.4" filter="url(#ursaPolarisHalo)" />
        <circle class="constellation-ursa-minor__star" cx="48.5" cy="24" r="2" filter="url(#ursaStarHalo)" />
        <circle class="constellation-ursa-minor__star" cx="46" cy="41" r="1.9" filter="url(#ursaStarHalo)" />
        <circle class="constellation-ursa-minor__star" cx="43" cy="58" r="2.1" filter="url(#ursaStarHalo)" />
        <circle class="constellation-ursa-minor__star" cx="29" cy="70" r="1.9" filter="url(#ursaStarHalo)" />
        <circle class="constellation-ursa-minor__star" cx="71" cy="74" r="2" filter="url(#ursaStarHalo)" />
        <circle class="constellation-ursa-minor__star" cx="19.5" cy="92" r="2.1" filter="url(#ursaStarHalo)" />
        <text class="constellation-ursa-minor__label" x="50" y="112" text-anchor="middle">Ursa Minor</text>
        <text class="constellation-ursa-minor__sublabel" x="50" y="124" text-anchor="middle">Seven stars · Little Dipper</text>
    </svg>

    <div class="container">
        <div class="left-panel" id="leftPanel">
            <div class="loading">Loading profile...</div>
        </div>

        <div class="right-panel" id="rightPanel">
            <div class="loading">Loading profile...</div>
        </div>
    </div>
    
    <footer class="page-footer">
        <div class="page-title">
            <h1 id="profileName">Loading...</h1>
            <p class="page-subtitle" id="profileTitle">Loading...</p>
        </div>
    </footer>

    <!-- Robot Character -->
    <div class="robot-container" id="robotContainer">
        <div class="robot">
            <div class="robot-head">
                <div class="robot-face">
                    <div class="robot-eyes">
                        <div class="robot-eye left-eye">
                            <div class="robot-pupil"></div>
                        </div>
                        <div class="robot-eye right-eye">
                            <div class="robot-pupil"></div>
                        </div>
                    </div>
                </div>
                <div class="robot-ears">
                    <div class="robot-ear left-ear"></div>
                    <div class="robot-ear right-ear"></div>
                </div>
            </div>
            <div class="robot-body">
                <div class="robot-arms">
                    <div class="robot-arm left-arm">
                        <div class="robot-hand left-hand">
                            <div class="robot-finger"></div>
                            <div class="robot-finger"></div>
                            <div class="robot-finger"></div>
                            <div class="robot-finger"></div>
                            <div class="robot-finger"></div>
                        </div>
                    </div>
                    <div class="robot-arm right-arm">
                        <div class="robot-hand right-hand">
                            <div class="robot-finger"></div>
                            <div class="robot-finger"></div>
                            <div class="robot-finger"></div>
                            <div class="robot-finger"></div>
                            <div class="robot-finger pointer-finger"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="robot-base">
                <div class="robot-wheels">
                    <div class="robot-wheel left-wheel"></div>
                    <div class="robot-wheel right-wheel"></div>
                </div>
                <div class="robot-base-front"></div>
            </div>
            <div class="robot-shadow"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
